<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>送信完了｜TUSG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 共通CSS（indexと同じもの） -->
    <link rel="stylesheet" href="css/style.css">

    <!-- フォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #F5F5F5;
        }
        .thanks-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .thanks-box {
            background: #FFFFFF;
            max-width: 600px;
            width: 100%;
            padding: 50px 40px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .thanks-box h1 {
            color: #2E8B57;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .thanks-box p {
            color: #444;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .thanks-box .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #2E8B57;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: opacity .3s;
        }
        .thanks-box .btn:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>

<div class="thanks-wrapper">
    <div class="thanks-box">
        <h1>お問い合わせありがとうございます</h1>
        <p>
            この度は、合同会社TUSGへお問い合わせいただき誠にありがとうございます。<br>
            内容を確認の上、<strong>1〜2営業日以内</strong>にご連絡させていただきます。
        </p>
        <p>
            万が一、数日経っても返信がない場合は、<br>
            お手数ですが再度ご連絡いただけますと幸いです。
        </p>
        <a href="index.html" class="btn">トップページへ戻る</a>
    </div>
</div>

</body>
</html>
